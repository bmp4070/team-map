<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where We're From</title>
<style>
  :root {
    --bg: #0a0a1a;
    --bg-card: #12122a;
    --border: #2a2a4a;
    --text: #eee;
    --text-muted: #888;
    --accent: #4d9fff;
    --accent-glow: rgba(77, 159, 255, .5);
    --dot: #4d9fff;
    --dot-hover: #7cb8ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  h1 {
    font-size: 2.2rem;
    margin: 1.5rem 0 0.3rem;
    background: linear-gradient(135deg, #4d9fff, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 1rem;
    margin-bottom: 1rem;
  }

  .map-container {
    position: relative;
    width: 95vw;
    max-width: 1200px;
    margin: 0.5rem auto;
    background: #0d1117;
    border-radius: 12px;
    overflow: hidden;
  }

  canvas#mapCanvas {
    width: 100%;
    display: block;
    cursor: default;
  }

  .tooltip {
    position: absolute;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    max-width: 300px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .tooltip.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .tooltip-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.2rem;
  }

  .tooltip-city {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.6rem;
  }

  .tooltip-fact {
    font-size: 0.9rem;
    line-height: 1.4;
    color: var(--text);
  }

  .tooltip-fact::before {
    content: "Fun fact: ";
    color: var(--accent);
    font-weight: 600;
  }

  .instructions {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 0.5rem;
    text-align: center;
  }

  .team-count {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-top: 0.5rem;
  }

  .setup-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem;
    width: 100%;
    max-width: 700px;
  }

  .setup-screen h2 {
    font-size: 1.3rem;
    margin: 1rem 0 0.5rem;
    color: var(--text);
  }

  .setup-screen p {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 1rem;
    text-align: center;
  }

  textarea {
    width: 100%;
    min-height: 250px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 0.9rem;
    padding: 1rem;
    resize: vertical;
    line-height: 1.6;
  }

  textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  .btn {
    margin-top: 1rem;
    padding: 0.75rem 2rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: #3a88e8; transform: scale(1.03); }
  .btn:active { transform: scale(0.98); }

  .game-screen { display: none; width: 100%; }
  .game-screen.active { display: flex; flex-direction: column; align-items: center; }
  .setup-screen.hidden { display: none; }

  .loading { color: var(--text-muted); font-size: 1rem; padding: 3rem; }
</style>
</head>

function lookupCity(cityName) {
  const key = cityName.toLowerCase().trim();
  let entry = CITY_DB[key];
  if (!entry) {
    for (const [k, v] of Object.entries(CITY_DB)) {
      if (k.includes(key) || key.includes(k)) { entry = v; break; }
    }
  }
  if (!entry) return null;
  // Normalize: if entry has 'fact' string, convert to single-element 'facts' array
  if (entry.fact && !entry.facts) entry.facts = [entry.fact];
  return entry;
}

// Geocode unknown cities via OpenStreetMap Nominatim
async function geocodeCity(cityName, country) {
  const query = country ? `${cityName}, ${country}` : cityName;
  try {
    const resp = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`, {
      headers: { 'User-Agent': 'TeamMapIceBreaker/1.0' }
    });
    const results = await resp.json();
    if (results.length > 0) {
      const r = results[0];
      const display = country ? `${cityName}, ${country}` : r.display_name.split(',').slice(0, 2).join(',');
      const entry = {
        lat: parseFloat(r.lat),
        lng: parseFloat(r.lon),
        display,
        facts: [`${cityName} is located at ${parseFloat(r.lat).toFixed(1)}°${r.lat >= 0 ? 'N' : 'S'}, ${Math.abs(parseFloat(r.lon)).toFixed(1)}°${r.lon >= 0 ? 'E' : 'W'}.`]
      };
      // Cache in DB for future lookups
      CITY_DB[cityName.toLowerCase().trim()] = entry;
      return entry;
    }
  } catch (e) {
    console.warn(`Geocoding failed for ${cityName}:`, e);
  }
  return null;
}

// ── Map rendering with real GeoJSON ──
const GEO_URL = "https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json";
let geoData = null;
let mapMembers = [];
let dotPositions = []; // {x, y, r, member}
let selectedDot = null;
let canvas, ctx;
let pulsePhase = 0;
let animFrame;

// Mercator projection (clamped to ~85 degrees to avoid infinity)
function project(lng, lat, w, h) {
  const x = (lng + 180) / 360 * w;
  const latRad = lat * Math.PI / 180;
  const mercN = Math.log(Math.tan(Math.PI / 4 + latRad / 2));
  const y = h / 2 - (w * mercN) / (2 * Math.PI);
  return { x, y };
}

function drawMap() {
  if (!canvas || !geoData) return;
  const w = canvas.width;
  const h = canvas.height;
  const dpr = window.devicePixelRatio || 1;

  ctx.clearRect(0, 0, w, h);

  // Background
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = '#141e2b';
  ctx.lineWidth = 0.5 * dpr;
  for (let lng = -180; lng <= 180; lng += 30) {
    const p = project(lng, 0, w, h);
    ctx.beginPath();
    ctx.moveTo(p.x, 0);
    ctx.lineTo(p.x, h);
    ctx.stroke();
  }
  for (let lat = -60; lat <= 80; lat += 20) {
    const p = project(0, lat, w, h);
    ctx.beginPath();
    ctx.moveTo(0, p.y);
    ctx.lineTo(w, p.y);
    ctx.stroke();
  }

  // Draw land from TopoJSON
  ctx.fillStyle = '#162038';
  ctx.strokeStyle = '#2a3f6a';
  ctx.lineWidth = 0.6 * dpr;

  if (geoData.type === 'Topology') {
    // It's TopoJSON, need to decode arcs
    const land = geoData.objects.land;
    const arcs = geoData.arcs;
    const transform = geoData.transform;

    function decodeArc(arcIdx) {
      const reverse = arcIdx < 0;
      const idx = reverse ? ~arcIdx : arcIdx;
      const arc = arcs[idx];
      const coords = [];
      let x = 0, y = 0;
      for (const [dx, dy] of arc) {
        x += dx;
        y += dy;
        const lng = x * transform.scale[0] + transform.translate[0];
        const lat = y * transform.scale[1] + transform.translate[1];
        coords.push([lng, lat]);
      }
      if (reverse) coords.reverse();
      return coords;
    }

    function drawGeometry(geom) {
      const rings = geom.type === 'MultiPolygon'
        ? geom.arcs.flat()
        : geom.arcs;

      for (const ring of rings) {
        const coords = [];
        for (const arcIdx of ring) {
          coords.push(...decodeArc(arcIdx));
        }
        if (coords.length === 0) continue;

        ctx.beginPath();
        const first = project(coords[0][0], coords[0][1], w, h);
        ctx.moveTo(first.x, first.y);
        for (let i = 1; i < coords.length; i++) {
          const p = project(coords[i][0], coords[i][1], w, h);
          ctx.lineTo(p.x, p.y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }
    }

    if (land.type === 'GeometryCollection') {
      for (const geom of land.geometries) {
        drawGeometry(geom);
      }
    } else {
      drawGeometry(land);
    }
  }

  // Draw dots
  const baseDotR = 6 * dpr;
  dotPositions = [];

  // Distinct dot colors for co-located members
  const DOT_COLORS = [
    { fill: '#4d9fff', glow: 'rgba(77,159,255,0.3)',  pulse: 'rgba(77,159,255,' },
    { fill: '#f97316', glow: 'rgba(249,115,22,0.3)',   pulse: 'rgba(249,115,22,' },
    { fill: '#a78bfa', glow: 'rgba(167,139,250,0.3)',  pulse: 'rgba(167,139,250,' },
    { fill: '#34d399', glow: 'rgba(52,211,153,0.3)',   pulse: 'rgba(52,211,153,' },
    { fill: '#f472b6', glow: 'rgba(244,114,182,0.3)',  pulse: 'rgba(244,114,182,' },
    { fill: '#fbbf24', glow: 'rgba(251,191,36,0.3)',   pulse: 'rgba(251,191,36,' },
  ];

  // Group by location
  const locationMap = {};
  for (const m of mapMembers) {
    const key = `${m.lat},${m.lng}`;
    if (!locationMap[key]) locationMap[key] = [];
    locationMap[key].push(m);
  }

  for (const group of Object.values(locationMap)) {
    const m0 = group[0];
    const base = project(m0.lng, m0.lat, w, h);
    const isShared = group.length > 1;
    // Shrink dots when sharing a city so they don't overlap
    const dotR = isShared ? baseDotR * 0.7 : baseDotR;
    const spacing = dotR * 2.4;

    group.forEach((member, idx) => {
      const color = isShared ? DOT_COLORS[idx % DOT_COLORS.length] : DOT_COLORS[0];
      const offsetX = isShared ? (idx - (group.length - 1) / 2) * spacing : 0;
      const cx = base.x + offsetX;
      const cy = base.y;

      // Pulse ring
      const pulseR = dotR + (dotR * 2.5) * ((pulsePhase + idx * 0.3) % 1);
      const pulseAlpha = 0.5 * (1 - ((pulsePhase + idx * 0.3) % 1));
      ctx.beginPath();
      ctx.arc(cx, cy, pulseR, 0, Math.PI * 2);
      ctx.strokeStyle = `${color.pulse}${pulseAlpha})`;
      ctx.lineWidth = 1.5 * dpr;
      ctx.stroke();

      // Glow
      ctx.beginPath();
      ctx.arc(cx, cy, dotR * 1.8, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(cx, cy, dotR * 0.5, cx, cy, dotR * 1.8);
      grad.addColorStop(0, color.glow);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fill();

      // Dot
      const isSelected = selectedDot && selectedDot.initials === member.initials && selectedDot.lat === member.lat;
      ctx.beginPath();
      ctx.arc(cx, cy, isSelected ? dotR * 1.2 : dotR, 0, Math.PI * 2);
      ctx.fillStyle = color.fill;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1 * dpr;
      ctx.stroke();

      // Show initials ONLY if this dot is selected
      if (isSelected) {
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${Math.round(5 * dpr)}px 'Segoe UI', system-ui, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(member.initials, cx, cy - dotR * 1.8);
      }

      dotPositions.push({ x: cx, y: cy, r: dotR * 1.3, member, color: color.fill });
    });
  }
}

function animate() {
  pulsePhase = (pulsePhase + 0.005) % 1;
  drawMap();
  animFrame = requestAnimationFrame(animate);
}

function setupCanvas() {
  canvas = document.getElementById('mapCanvas');
  ctx = canvas.getContext('2d');
  const container = document.getElementById('mapContainer');
  const dpr = window.devicePixelRatio || 1;
  const rect = container.getBoundingClientRect();
  const w = rect.width;
  const h = w * 0.52; // aspect ratio for Mercator
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
}

function handleCanvasClick(e) {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const mx = (e.clientX - rect.left) * dpr;
  const my = (e.clientY - rect.top) * dpr;

  let hit = null;
  for (const dot of dotPositions) {
    const dx = mx - dot.x;
    const dy = my - dot.y;
    if (dx * dx + dy * dy < dot.r * dot.r) {
      hit = dot;
      break;
    }
  }

  if (hit) {
    selectedDot = hit.member;
    showTooltip(hit.member, hit.x, hit.y, hit.color);
  } else {
    selectedDot = null;
    hideTooltip();
  }
}

function handleCanvasMove(e) {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const mx = (e.clientX - rect.left) * dpr;
  const my = (e.clientY - rect.top) * dpr;

  let hovering = false;
  for (const dot of dotPositions) {
    const dx = mx - dot.x;
    const dy = my - dot.y;
    if (dx * dx + dy * dy < dot.r * dot.r) {
      hovering = true;
      break;
    }
  }
  canvas.style.cursor = hovering ? 'pointer' : 'default';
}

function showTooltip(member, canvasX, canvasY, dotColor) {
  const tooltip = document.getElementById('tooltip');
  const container = document.getElementById('mapContainer');
  const rect = container.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;

  const pixelX = canvasX / dpr;
  const pixelY = canvasY / dpr;

  const nameEl = document.getElementById('tooltipName');
  nameEl.innerHTML = `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${dotColor};margin-right:6px;vertical-align:middle;"></span>${member.initials}`;
  document.getElementById('tooltipCity').textContent = member.display;
  document.getElementById('tooltipFact').textContent = member.fact;

  let left = pixelX + 15;
  let top = pixelY - 20;

  if (left + 300 > rect.width) left = pixelX - 315;
  if (top + 160 > rect.height) top = rect.height - 170;
  if (top < 0) top = 10;
  if (left < 0) left = 10;

  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
  tooltip.classList.add('visible');
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

async function loadGeoData() {
  const resp = await fetch(GEO_URL);
  geoData = await resp.json();
}

async function startMap() {
  const input = document.getElementById('teamInput').value.trim();
  if (!input) return;

  const lines = input.split('\n').filter(l => l.trim());
  const members = [];
  const toGeocode = [];

  for (const line of lines) {
    const parts = line.split(',').map(s => s.trim());
    if (parts.length < 2) continue;
    const initials = parts[0].toUpperCase();
    const city = parts[1];
    const country = parts[2] || '';
    const data = lookupCity(city);
    if (data) {
      members.push({ initials, city, country, lat: data.lat, lng: data.lng, display: data.display, facts: data.facts });
    } else {
      toGeocode.push({ initials, city, country });
    }
  }

  // Geocode unknown cities (sequentially to respect Nominatim rate limits)
  if (toGeocode.length > 0) {
    document.getElementById('setup').querySelector('.btn').textContent = `Looking up ${toGeocode.length} unknown cities...`;
    for (const entry of toGeocode) {
      const data = await geocodeCity(entry.city, entry.country);
      if (data) {
        members.push({ initials: entry.initials, city: entry.city, country: entry.country, lat: data.lat, lng: data.lng, display: data.display, facts: data.facts });
      } else {
        console.warn(`Could not geocode: ${entry.city}. Skipping ${entry.initials}.`);
      }
      // Small delay between requests to be polite to Nominatim
      if (toGeocode.length > 1) await new Promise(r => setTimeout(r, 300));
    }
    document.getElementById('setup').querySelector('.btn').textContent = 'Show on Map';
  }

  // Assign per-member fact: rotate through available facts for shared cities
  const cityCount = {};
  for (const m of members) {
    const key = `${m.lat},${m.lng}`;
    cityCount[key] = (cityCount[key] || 0);
    const idx = cityCount[key] % m.facts.length;
    m.fact = m.facts[idx];
    cityCount[key]++;
  }

  if (members.length === 0) {
    alert('No recognized cities found. Please check your input.');
    return;
  }

  document.getElementById('setup').classList.add('hidden');
  document.getElementById('game').classList.add('active');
  document.getElementById('teamCount').textContent = `${members.length} team members across the globe`;

  mapMembers = members;
  selectedDot = null;

  if (!geoData) await loadGeoData();

  // Ensure layout is computed before measuring canvas
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  setupCanvas();

  // Remove old listeners to avoid duplicates when re-entering from Edit Team
  canvas.removeEventListener('click', handleCanvasClick);
  canvas.removeEventListener('mousemove', handleCanvasMove);
  canvas.addEventListener('click', handleCanvasClick);
  canvas.addEventListener('mousemove', handleCanvasMove);

  if (animFrame) cancelAnimationFrame(animFrame);
  animate();
}

function goBack() {
  document.getElementById('game').classList.remove('active');
  document.getElementById('setup').classList.remove('hidden');
  hideTooltip();
  selectedDot = null;
  if (animFrame) cancelAnimationFrame(animFrame);
}

window.addEventListener('resize', () => {
  if (document.getElementById('game').classList.contains('active')) {
    setupCanvas();
  }
});
</script>
